<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Royzo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      flex-direction: column;
    }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid #fff; border-bottom-color: #6c5ce7;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="text" id="status">Loading Royzo...</div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const isNative = window.Capacitor && window.Capacitor.isNativePlatform();

      if (isNative) {
        try {
          if ('Notification' in window && Notification.permission === 'default') {
            statusEl.textContent = 'Requesting notification access...';
            await Notification.requestPermission();
          }
        } catch (e) {
          console.log('Notification request skipped');
        }
      }

      statusEl.textContent = 'Loading...';
      window.location.href = 'https://royzoworld.ai1x.us.ci';
    })();
  </script>
</body>
</html>
