<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Royzo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      flex-direction: column;
    }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid #fff; border-bottom-color: #6c5ce7;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { color: #aaa; font-size: 14px; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="text" id="status">Setting up permissions...</div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const isNative = window.Capacitor && window.Capacitor.isNativePlatform();

      if (isNative) {
        // Request notification permission (already working)
        if ('Notification' in window && Notification.permission === 'default') {
          statusEl.textContent = 'Requesting notification access...';
          await Notification.requestPermission();
        }

        // Request camera permission (will trigger system dialog)
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          try {
            statusEl.textContent = 'Requesting camera access...';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            stream.getTracks().forEach(track => track.stop()); // release immediately
          } catch (e) {
            console.log('Camera permission denied or already granted');
          }
        }

        // Request microphone permission
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          try {
            statusEl.textContent = 'Requesting microphone access...';
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
          } catch (e) {
            console.log('Microphone permission denied or already granted');
          }
        }

        // Request location permission
        if (navigator.geolocation) {
          try {
            statusEl.textContent = 'Requesting location access...';
            await new Promise((resolve, reject) => {
              navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
            });
          } catch (e) {
            console.log('Location permission denied or already granted');
          }
        }
      }

      statusEl.textContent = 'Loading Royzo...';
      window.location.href = 'https://royzoworld.ai1x.us.ci';
    })();
  </script>
</body>
</html>
