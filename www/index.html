<!DOCTYPE html>
<html>
<head><title>Loading...</title>
<style>
  body { background: #0f0f1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
  .loader { width:48px; height:48px; border:5px solid #fff; border-bottom-color: transparent; border-radius:50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body><div class="loader"></div></body>
</html>
